name: Production Delivery Pipeline
repository: https://github.com/example/my-project.git
branch: main
concurrency: 2 # Limit parallel jobs to prevent resource exhaustion

# Global environment variables
env:
  DOCKER_REGISTRY: "index.docker.io"
  IMAGE_NAME: "my-username/my-app"
  IMAGE_TAG: "latest"

on_success: "echo 'Pipeline completed successfully!'"
on_failure: "echo 'Pipeline failed. Check logs for details.'"

jobs:
  - name: Build
    steps:
      - name: Compile Code
        command: cargo build --release

  - name: Test
    # Sequential by default: runs after 'Build'
    steps:
      - name: Run Unit Tests
        command: cargo test

  - name: Lint
    # Explicit Parallel: Runs immediately along with Build/Test
    parallel: true
    steps:
      - name: Code Quality
        command: cargo clippy

  - name: Dockerize
    # DAG: specifically requires 'Test' to be finished
    needs: ["Test"]
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Build Docker Image
        command: "docker build -t $IMAGE_NAME:$IMAGE_TAG ."
      
      - name: Login to Registry
        command: "docker login -u $DOCKER_USER -p $DOCKER_PASS"
      
      - name: Push Image
        command: "docker push $IMAGE_NAME:$IMAGE_TAG"

name: Conveyor Build
env:
  GLOBAL_VAR: "global_value"
  API_KEY: "secret_123"
jobs:
  - name: Build
    env:
      BUILD_MODE: "release"
    steps:
      - name: Compile
        command: cargo build
  - name: Test
    needs: ["Build"]
    steps:
      - name: Unit Tests
        command: cargo test
  - name: Lint
    steps:
      - name: Check
        command: cargo clippy
